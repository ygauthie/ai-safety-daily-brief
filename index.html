<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Safety Radar</title>
  <meta name="description" content="Daily AI safety research, policy, and development digest">
  <link rel="alternate" type="application/rss+xml" title="AI Safety Radar RSS" href="feed.xml">
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-subtle: #1f6feb22;
      --green: #3fb950;
      --orange: #d29922;
      --red: #f85149;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }

    .logo {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
    }

    .logo span { color: var(--text); }

    nav { display: flex; gap: 1rem; align-items: center; }

    nav a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
    }

    nav a:hover { color: var(--accent); }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
    }

    .sidebar {
      position: fixed;
      left: 0;
      top: 52px;
      bottom: 0;
      width: 260px;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 1rem;
      background: var(--bg);
    }

    .main {
      margin-left: 260px;
      padding: 2rem;
      min-height: calc(100vh - 52px);
    }

    .date-group {
      margin-bottom: 1rem;
    }

    .date-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 600;
      padding: 0.3rem 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .file-link {
      display: block;
      padding: 0.3rem 0.5rem 0.3rem 1rem;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      border-radius: 4px;
    }

    .file-link:hover, .file-link.active {
      background: var(--accent-subtle);
      color: var(--accent);
    }

    .file-link .badge {
      font-size: 0.7rem;
      padding: 0.1rem 0.4rem;
      border-radius: 10px;
      margin-left: 0.3rem;
      vertical-align: middle;
    }

    .badge-daily { background: var(--green); color: #000; }
    .badge-weekly { background: var(--orange); color: #000; }
    .badge-arxiv { background: #8957e5; color: #fff; }

    #content {
      max-width: 800px;
    }

    #content h1 { font-size: 1.8rem; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    #content h2 { font-size: 1.4rem; margin: 1.5rem 0 0.75rem; color: var(--accent); }
    #content h3 { font-size: 1.1rem; margin: 1rem 0 0.5rem; }
    #content p { margin-bottom: 0.75rem; }
    #content a { color: var(--accent); text-decoration: none; }
    #content a:hover { text-decoration: underline; }
    #content ul, #content ol { padding-left: 1.5rem; margin-bottom: 0.75rem; }
    #content li { margin-bottom: 0.3rem; }
    #content code { background: var(--surface); padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.9em; }
    #content pre { background: var(--surface); padding: 1rem; border-radius: 6px; overflow-x: auto; margin-bottom: 1rem; }
    #content pre code { background: none; padding: 0; }
    #content blockquote { border-left: 3px solid var(--accent); padding-left: 1rem; color: var(--text-muted); margin-bottom: 0.75rem; }
    #content hr { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
    #content strong { color: #fff; }

    .welcome {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .welcome h1 {
      color: var(--accent);
      border: none;
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .welcome p { font-size: 1.1rem; }

    .loading { color: var(--text-muted); padding: 2rem; text-align: center; }

    @media (max-width: 768px) {
      .sidebar {
        position: static;
        width: 100%;
        border-right: none;
        border-bottom: 1px solid var(--border);
        max-height: 40vh;
      }
      .main { margin-left: 0; }
    }
  </style>
</head>
<body>
  <header>
    <a href="#" class="logo">AI Safety <span>Radar</span></a>
    <nav>
      <a href="feed.xml">RSS</a>
      <a href="https://github.com/yvan/ai-safety-radar">GitHub</a>
    </nav>
  </header>

  <div class="sidebar" id="sidebar">
    <div class="loading">Loading digest list...</div>
  </div>

  <div class="main">
    <div id="content">
      <div class="welcome">
        <h1>AI Safety Radar</h1>
        <p>Daily digest of AI safety research, policy, and developments.</p>
        <p style="margin-top: 1rem; font-size: 0.9rem;">Select a digest from the sidebar to begin reading.</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const BASE = '';

    function fileLabel(filename) {
      const map = {
        'safety-daily': 'Daily Summary',
        'safety-weekly': 'Weekly Summary',
        'safety-arxiv': 'ArXiv Papers',
        'safety-github': 'GitHub',
        'safety-rss': 'Blog Posts',
        'safety-web': 'Org Updates',
        'safety-hn': 'Hacker News',
      };
      for (const [key, label] of Object.entries(map)) {
        if (filename.includes(key)) return label;
      }
      return filename.replace('.md', '');
    }

    function fileBadge(filename) {
      if (filename.includes('daily')) return '<span class="badge badge-daily">daily</span>';
      if (filename.includes('weekly')) return '<span class="badge badge-weekly">weekly</span>';
      if (filename.includes('arxiv')) return '<span class="badge badge-arxiv">arxiv</span>';
      return '';
    }

    async function loadManifest() {
      try {
        const res = await fetch(`${BASE}manifest.json`);
        if (!res.ok) throw new Error('No manifest');
        return await res.json();
      } catch {
        return { entries: [] };
      }
    }

    function renderSidebar(manifest) {
      const sidebar = document.getElementById('sidebar');
      if (manifest.entries.length === 0) {
        sidebar.innerHTML = '<div class="loading">No digests available yet.<br>Run the pipeline to generate the first digest.</div>';
        return;
      }

      let html = '';
      for (const entry of manifest.entries) {
        html += `<div class="date-group">`;
        html += `<div class="date-label">${entry.date}</div>`;
        for (const file of entry.files) {
          const hash = `${entry.date}/${file}`;
          html += `<a href="#${hash}" class="file-link" data-hash="${hash}">${fileLabel(file)}${fileBadge(file)}</a>`;
        }
        html += `</div>`;
      }
      sidebar.innerHTML = html;
    }

    async function loadContent(path) {
      const content = document.getElementById('content');
      content.innerHTML = '<div class="loading">Loading...</div>';

      try {
        const res = await fetch(`${BASE}digests/${path}`);
        if (!res.ok) throw new Error('Not found');
        const md = await res.text();
        content.innerHTML = marked.parse(md);
      } catch {
        content.innerHTML = '<div class="loading">Failed to load digest.</div>';
      }

      // Update active state
      document.querySelectorAll('.file-link').forEach(el => {
        el.classList.toggle('active', el.dataset.hash === path);
      });
    }

    function handleHash() {
      const hash = location.hash.slice(1);
      if (hash) loadContent(hash);
    }

    async function init() {
      const manifest = await loadManifest();
      renderSidebar(manifest);
      handleHash();

      // Auto-load latest daily if no hash
      if (!location.hash && manifest.entries.length > 0) {
        const latest = manifest.entries[0];
        const daily = latest.files.find(f => f.includes('daily')) || latest.files[0];
        location.hash = `${latest.date}/${daily}`;
      }
    }

    window.addEventListener('hashchange', handleHash);
    init();
  </script>
</body>
</html>
